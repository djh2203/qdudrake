<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 金色粒子星空</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #00469c; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }

    /* ---- 预加载器 ---- */
    #preloader {
      position: fixed;
      inset: 0;
      background: #00469c;
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #loading-svg {
      width: 60px;
      height: 86px;
    }
    .load-rect {
      fill: none;
      stroke: #FFD700;
      stroke-width: 2;
      stroke-linecap: round;
    }

    #dots {
      display: flex;
      gap: 6px;
      margin-top: 20px;
      justify-content: center;
    }
    .dot {
      width: 6px; height: 6px;
      background: #FFD700;
      border-radius: 50%;
      opacity: 0;
      animation: breathe 1.2s infinite alternate;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    .dot:nth-child(4) { animation-delay: 0.6s; }
    @keyframes breathe {
      from { opacity: 0.2; transform: translateY(0); }
      to { opacity: 1; transform: translateY(-8px); }
    }

    #enter-btn {
      margin-top: 30px;
      background: none;
      border: 1px solid #FFD700;
      color: #FFD700;
      padding: 10px 30px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.5s;
    }

    /* ---- 页面元素 ---- */
    #logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(3);
      width: 650px;
      height: auto;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
    }

    #main-title {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      font-family: Georgia, serif;
      color: #FFD700;
      z-index: 15;
      letter-spacing: 4px;
      --mask: linear-gradient(90deg, transparent 100%, black 150%);
      -webkit-mask-image: var(--mask);
      mask-image: var(--mask);
    }
  </style>
</head>
<body>

  <!-- 预加载器 -->
  <div id="preloader">
    <svg id="loading-svg" viewBox="0 0 60 86">
      <rect class="load-rect" x="1" y="1" width="58" height="84" rx="28" />
    </svg>
    <div id="dots">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
    <button id="enter-btn">Enter Site</button>
  </div>

  <!-- 页面元素 -->
  <img id="logo" src="logo.png" alt="Logo" />
  <h1 id="main-title">SLEEP WELL</h1>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "gsap": "https://cdn.jsdelivr.net/npm/gsap@3.12.5/src/index.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import gsap from 'gsap';

    // ============ 场景、相机、渲染器 ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00469c);
    scene.fog = new THREE.FogExp2(0x003366, 0.015);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 0, 15);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ============ 背景星星 ============
    const bgStars = new THREE.BufferGeometry();
    const bgPositions = new Float32Array(1500 * 3);
    for (let i = 0; i < 1500; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 40;
      bgPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      bgPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      bgPositions[i * 3 + 2] = r * Math.cos(phi);
    }
    bgStars.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));

    const bgMaterial = new THREE.PointsMaterial({
      color: 0x88aaff,
      size: 0.3,
      transparent: true,
      opacity: 0,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const bgStarsMesh = new THREE.Points(bgStars, bgMaterial);
    scene.add(bgStarsMesh);

    // ============ 装饰光环 ============
    const ringGeo = new THREE.TorusGeometry(3, 0.03, 16, 100);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xFFD700,
      transparent: true,
      opacity: 0,
      depthWrite: false,
    });
    const ring1 = new THREE.Mesh(ringGeo, ringMat);
    const ring2 = new THREE.Mesh(ringGeo, ringMat);
    ring1.rotation.x = Math.PI / 2;
    ring2.rotation.y = Math.PI / 2;
    ring1.scale.set(0, 0, 0);
    ring2.scale.set(0, 0, 0);
    scene.add(ring1);
    scene.add(ring2);

    // ============ 基础动画循环 ============
    let time = 0, cameraAngle = 0;
    const targetCam = new THREE.Vector3();
    const currentCam = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);
      time += 0.016;
      cameraAngle += 0.003;
      targetCam.set(
        Math.sin(cameraAngle) * 15,
        Math.sin(time * 0.2) * 3,
        Math.cos(cameraAngle) * 15
      );
      currentCam.lerp(targetCam, 0.02);
      camera.position.copy(currentCam);
      camera.lookAt(0, 0, 0);
      renderer.render(scene, camera);
    }

    // ============ 入场动画编排 ============
    window.addEventListener('DOMContentLoaded', () => {
      const preloader = document.getElementById('preloader');
      const enterBtn = document.getElementById('enter-btn');
      const svgRect = document.querySelector('.load-rect');

      // 动态计算路径长度
      const pathLength = svgRect.getTotalLength();
      svgRect.style.strokeDasharray = pathLength;
      svgRect.style.strokeDashoffset = pathLength;

      // 模拟加载
      setTimeout(() => {
        svgRect.style.strokeDashoffset = '0';
        setTimeout(() => {
          enterBtn.style.opacity = '1';
        }, 1500);
      }, 200);

      // 点击进入
      enterBtn.addEventListener('click', () => {
        gsap.to(preloader, {
          opacity: 0, duration: 0.6,
          onComplete: () => preloader.remove()
        });

        const master = gsap.timeline();

        // Logo
        master.fromTo('#logo',
          { scale: 3, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.8, ease: 'power2.out' }
        );

        // 标题文字擦除
        master.to('#main-title', {
          '--mask': 'linear-gradient(90deg, transparent -50%, black 0%)',
          duration: 2,
          ease: 'sine.out'
        }, '+=0.2');

        // 背景星星
        master.to(bgMaterial, { opacity: 0.4, duration: 1.5, ease: 'power2.inOut' }, 0);

        // 光环展开
        master.to(ringMat, { opacity: 0.5, duration: 1.5 }, 0);
        master.fromTo(ring1.scale,
          { x: 0, y: 0, z: 0 },
          { x: 1, y: 1, z: 1, duration: 2, ease: 'power4.out' },
          0
        );
        master.fromTo(ring2.scale,
          { x: 0, y: 0, z: 0 },
          { x: 1, y: 1, z: 1, duration: 2, ease: 'power4.out' },
          0
        );

        // 入场完成后启动永动旋转
        master.eventCallback('onComplete', () => {
          gsap.to(ring1.rotation, { y: '+=6.28', duration: 10, repeat: -1, ease: 'none' });
          gsap.to(ring2.rotation, { x: '+=6.28', duration: 8, repeat: -1, ease: 'none' });
        });
      });
    });

    // ============ 响应式 ============
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
