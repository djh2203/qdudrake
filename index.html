<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 金色粒子星空</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #00469c;
    }
    canvas { display: block; z-index: 1; }
    #logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(3);
      width: 650px;
      height: 111px;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      animation: logoEnter 1s ease-out 0s forwards;
    }
    @keyframes logoEnter {
      0% {
        transform: translate(-50%, -50%) scale(3);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffd700;
      font-family: system-ui, sans-serif;
      font-size: 18px;
      z-index: 10;
      text-shadow: 0 0 20px #ffd700;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">加载中...</div>
  <img id="logo" src="logo.png" alt="Logo" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ============ 场景初始化 ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00469c);
    scene.fog = new THREE.FogExp2(0x003366, 0.015);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 15);

    const renderer = new THREE.WebGLRenderer({ 
      antialias: true,
      alpha: true 
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // ============ 背景星星 ============
    const bgStars = new THREE.BufferGeometry();
    const bgPositions = new Float32Array(1500 * 3);
    const bgSizes = new Float32Array(1500);

    for (let i = 0; i < 1500; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 40;
      bgPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      bgPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      bgPositions[i * 3 + 2] = r * Math.cos(phi);
      bgSizes[i] = Math.random() * 0.5 + 0.1;
    }

    bgStars.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
    bgStars.setAttribute('size', new THREE.BufferAttribute(bgSizes, 1));

    const bgMaterial = new THREE.PointsMaterial({
      color: 0x88aaff,
      size: 0.3,
      transparent: true,
      opacity: 0.4,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const bgStarsMesh = new THREE.Points(bgStars, bgMaterial);
    scene.add(bgStarsMesh);

    // ============ 动画 ============
    let time = 0;
    let cameraAngle = 0;
    const targetCameraPos = new THREE.Vector3();
    const currentCameraPos = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);
      
      time += 0.016;
      
      cameraAngle += 0.003;
      const radius = 15;
      const height = Math.sin(time * 0.2) * 3;
      
      targetCameraPos.set(
        Math.sin(cameraAngle) * radius,
        height,
        Math.cos(cameraAngle) * radius
      );
      
      currentCameraPos.lerp(targetCameraPos, 0.02);
      camera.position.copy(currentCameraPos);
      camera.lookAt(0, 0, 0);

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById('loading').classList.add('hidden');
    animate();
  </script>
</body>
</html>
