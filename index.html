<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 金色粒子星空</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      overflow: hidden; 
      background: #00469c;
    }
    canvas { display: block; }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffd700;
      font-family: system-ui, sans-serif;
      font-size: 18px;
      z-index: 10;
      text-shadow: 0 0 20px #ffd700;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">加载中...</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ============ 着色器 ============
    const vertexShader = `
      attribute float size;
      attribute float offset;
      uniform float time;
      varying float vAlpha;
      varying float vSize;

      void main() {
        vSize = size;
        vec3 pos = position;
        
        // 向上漂浮动画
        float floatY = mod(pos.y + offset + time * 0.15, 20.0) - 10.0;
        pos.y = floatY;
        
        // 轻微横向摆动
        pos.x += sin(time * 0.5 + offset * 2.0) * 0.3;
        pos.z += cos(time * 0.4 + offset * 1.5) * 0.3;
        
        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        
        // 粒子大小随距离变化
        gl_PointSize = size * (300.0 / -mvPosition.z);
        gl_PointSize = clamp(gl_PointSize, 1.0, 50.0);
        
        // 透明度：中心亮边缘暗
        vAlpha = smoothstep(0.0, 0.3, 1.0 - length(gl_PointCoord - vec2(0.5)));
        vAlpha = mix(0.3, 1.0, vAlpha);
      }
    `;

    const fragmentShader = `
      varying float vAlpha;
      varying float vSize;
      uniform float time;

      void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        
        // 金色发光效果
        float glow = 1.0 - dist * 2.0;
        glow = pow(glow, 1.5);
        
        // 主色金色 #FFD700，辅色偏橙
        vec3 goldColor = vec3(1.0, 0.84, 0.0);
        vec3 warmColor = vec3(1.0, 0.65, 0.2);
        vec3 finalColor = mix(warmColor, goldColor, glow);
        
        // 发光强度
        float intensity = glow * 1.5 + 0.3;
        
        gl_FragColor = vec4(finalColor * intensity, vAlpha * 0.8);
      }
    `;

    // ============ 场景初始化 ============
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00469c);
    // 添加雾效果增加深度
    scene.fog = new THREE.FogExp2(0x003366, 0.015);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 15);

    const renderer = new THREE.WebGLRenderer({ 
      antialias: true,
      alpha: true 
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 限制像素比以优化性能
    document.body.appendChild(renderer.domElement);

    // ============ 粒子系统 ============
    const PARTICLE_COUNT = 3000;
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const sizes = new Float32Array(PARTICLE_COUNT);
    const offsets = new Float32Array(PARTICLE_COUNT);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      // 球形分布
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = Math.pow(Math.random(), 0.5) * 12;
      
      positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);
      
      sizes[i] = Math.random() * 3 + 1;
      offsets[i] = Math.random() * 20;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    geometry.setAttribute('offset', new THREE.BufferAttribute(offsets, 1));

    const material = new THREE.ShaderMaterial({
      uniforms: {
        time: { value: 0 },
      },
      vertexShader,
      fragmentShader,
      transparent: true,
      blending: THREE.AdditiveBlending, // 加法混合增强发光
      depthWrite: false,
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // ============ 背景星星（简化版本） ============
    const bgStars = new THREE.BufferGeometry();
    const bgPositions = new Float32Array(1500 * 3);
    const bgSizes = new Float32Array(1500);

    for (let i = 0; i < 1500; i++) {
      // 球形分布，半径40，在相机外围形成均匀星空
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 40;
      bgPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      bgPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      bgPositions[i * 3 + 2] = r * Math.cos(phi);
      bgSizes[i] = Math.random() * 0.5 + 0.1;
    }

    bgStars.setAttribute('position', new THREE.BufferAttribute(bgPositions, 3));
    bgStars.setAttribute('size', new THREE.BufferAttribute(bgSizes, 1));

    const bgMaterial = new THREE.PointsMaterial({
      color: 0x88aaff,
      size: 0.3,
      transparent: true,
      opacity: 0.4,
      sizeAttenuation: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });

    const bgStarsMesh = new THREE.Points(bgStars, bgMaterial);
    scene.add(bgStarsMesh);

    // ============ 动画 ============
    let time = 0;
    let cameraAngle = 0;
    const targetCameraPos = new THREE.Vector3();
    const currentCameraPos = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);
      
      time += 0.016; // 约60fps的时间步
      material.uniforms.time.value = time;

      // 相机围绕中心缓慢旋转
      cameraAngle += 0.003;
      const radius = 15;
      const height = Math.sin(time * 0.2) * 3;
      
      targetCameraPos.set(
        Math.sin(cameraAngle) * radius,
        height,
        Math.cos(cameraAngle) * radius
      );
      
      // 平滑相机移动
      currentCameraPos.lerp(targetCameraPos, 0.02);
      camera.position.copy(currentCameraPos);
      camera.lookAt(0, 0, 0);

      // 背景星星固定在球壳上，随相机旋转自然保持可见

      renderer.render(scene, camera);
    }

    // ============ 响应式处理 ============
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ============ 启动 ============
    document.getElementById('loading').classList.add('hidden');
    animate();
  </script>
</body>
</html>
